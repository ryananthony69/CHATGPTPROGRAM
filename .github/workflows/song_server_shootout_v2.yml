name: Sparse Lyrics Song Render

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/song_server_shootout_v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Publish run identifier
        run: |
          mkdir -p .songlab
          printf '%s' "$GITHUB_RUN_ID" > .songlab/run-id-v2.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .songlab/run-id-v2.txt
          git commit -m "Record sparse song render run" || true
          git push

      - name: Install audio and analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq
          python -m pip install -q --upgrade pip
          python -m pip install -q requests faster-whisper jiwer demucs

      - name: Generate, isolate vocals, and rank
        env:
          HOST: https://www.serveurperso.com/ia/music
        run: python .songlab/render_v2.py

      - name: Upload accepted render
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afraid-dark-sparse-final
          path: final/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afraid-dark-sparse-diagnostics
          path: raw/
          if-no-files-found: warn
          retention-days: 3
