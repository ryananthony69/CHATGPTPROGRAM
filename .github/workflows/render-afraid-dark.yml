name: Render Afraid of the Dark

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Install audio tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq ffmpeg

      - name: Build song request
        run: |
          cat > request.json <<'JSON'
          {
            "caption": "Upbeat theatrical power-pop and pop-punk comedy song with a genuinely melodic natural adult male lead singer, bright crunchy electric guitars, punchy live drums, melodic bass, subtle spooky organ, crisp modern production, humorous dramatic delivery, a rising pre-chorus, a huge catchy singalong chorus, tight backing harmonies, clear intelligible lyrics, energetic full-band performance. No spoken word, no narration, no rap, no robotic voice, no text-to-speech, no vocoder, no monotone delivery, no horror screaming.",
            "lyrics": "[Verse 1]\nI pay my bills, I own a drill,\nI act real tough until the house gets still.\nThat hoodie on the chair at half past two\nBecomes a seven-foot man who knows kung fu.\n\nThe ice machine drops; I freeze in place.\nMy cat looks past me with a worried face.\nThen he leaves the room like, Buddy, good luck.\nThat kind of teamwork absolutely sucks.\n\n[Pre-Chorus]\nI say there is nothing there.\nThe nothing says, Correct.\nI turn around politely\nSo the demon feels respected.\n\n[Chorus]\nTurn on the light, turn on the light.\nThat coat has been a murderer since quarter after midnight.\nI know it is just a chair; I know the facts are right.\nBut I will not negotiate until you turn on the light.\n\n[Verse 2]\nMy phone is at two percent, the charger's by the door.\nSix feet across the bedroom might as well be Mordor.\nOne sock on the carpet looks exactly like a hand.\nThen the Roomba wakes itself and now it is in command.\n\n[Pre-Chorus]\nI say there is nothing there.\nMy cat refuses to confirm.\nIf he can see the spirit world,\nHe should contribute to the rent.\n\n[Chorus]\nTurn on the light, turn on the light.\nThat coat has been a murderer since quarter after midnight.\nI know it is just a chair; I know the facts are right.\nBut I will not negotiate until you turn on the light.\n\n[Bridge]\nThe basement has a pull-chain designed by someone cruel.\nKill the light and run upstairs like a frightened little fool.\nGhost, if you live here, the gas bill is due the tenth.\nYou can haunt the cabinets, but you are splitting rent.\n\n[Build]\nI am not afraid.\nI am strategically alert.\nI am not afraid.\nThat laundry pile just smirked.\n\n[Final Chorus]\nTurn on the light, turn on the light.\nEvery normal household object joined a gang tonight.\nI am brave enough by day; I am a coward out of sight.\nSomebody be a hero and turn on the light.\n\n[Outro]\nIt was the cat.",
            "duration": 92,
            "bpm": 138,
            "vocal_language": "en",
            "keyscale": "D major",
            "timesignature": "4",
            "inference_steps": 8,
            "guidance_scale": 1.0,
            "shift": 3.0,
            "lm_batch_size": 2,
            "output_format": "mp3"
          }
          JSON
          jq . request.json

      - name: Generate two full-song candidates
        env:
          HOST: https://www.serveurperso.com/ia/music
        run: |
          set -euo pipefail
          wait_job() {
            local id="$1"
            local status=""
            for attempt in $(seq 1 360); do
              status=$(curl --retry 3 --retry-delay 2 -fsS "${HOST}/job?id=${id}" | jq -r '.status')
              echo "job ${id}: ${status} (${attempt})"
              case "$status" in
                done) return 0 ;;
                failed|cancelled) return 1 ;;
              esac
              sleep 5
            done
            return 1
          }
          curl --retry 3 -fsS "${HOST}/health" | tee health.json
          LM_ID=$(curl --retry 3 --retry-delay 2 -fsS "${HOST}/lm" -H 'Content-Type: application/json' --data-binary @request.json | jq -r '.id')
          test -n "$LM_ID" && test "$LM_ID" != "null"
          echo "LM job: ${LM_ID}"
          wait_job "$LM_ID"
          curl --retry 3 -fsS "${HOST}/job?id=${LM_ID}&result=1" -o lm-results.json
          count=$(jq 'length' lm-results.json)
          if [ "$count" -gt 2 ]; then count=2; fi
          for i in $(seq 0 $((count - 1))); do
            jq ".[$i]" lm-results.json > "candidate-${i}.json"
            SYNTH_ID=$(curl --retry 3 --retry-delay 2 -fsS "${HOST}/synth" -H 'Content-Type: application/json' --data-binary @"candidate-${i}.json" | jq -r '.id')
            test -n "$SYNTH_ID" && test "$SYNTH_ID" != "null"
            echo "Synth ${i}: ${SYNTH_ID}"
            wait_job "$SYNTH_ID"
            curl --retry 3 -fsS "${HOST}/job?id=${SYNTH_ID}&result=1" -o "Turn_On_The_Light_Candidate_$((i + 1)).mp3"
          done

      - name: Validate and create previews
        run: |
          set -euo pipefail
          mkdir -p deliverables
          cp request.json deliverables/Generation_Request.json
          jq -r '.lyrics' request.json > deliverables/Lyrics.txt
          for src in Turn_On_The_Light_Candidate_*.mp3; do
            test -s "$src"
            base="${src%.mp3}"
            ffprobe -v error -show_entries format=duration,size -of json "$src"
            ffmpeg -y -loglevel error -i "$src" -af "loudnorm=I=-14:TP=-1.0:LRA=11" -codec:a libmp3lame -b:a 256k "deliverables/${base}_Mastered.mp3"
            ffmpeg -y -loglevel error -ss 20 -t 30 -i "deliverables/${base}_Mastered.mp3" -codec:a libmp3lame -b:a 192k "deliverables/${base}_Preview.mp3"
          done
          (cd deliverables && sha256sum * > SHA256SUMS.txt)
          ls -lh deliverables

      - name: Upload finished songs
        uses: actions/upload-artifact@v4
        with:
          name: afraid-dark-ace-step-songs
          path: deliverables/
          if-no-files-found: error
          retention-days: 7
